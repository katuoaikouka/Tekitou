<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenninProxy</title>
    <script async src="https://arc.io/widget.min.js#YOUR_ARC_ID"></script>
    <style>
        :root {
            --bg-color: #0f172a; /* 濃い紺色 */
            --toolbar-color: #1e293b;
            --tab-active: #1e293b;
            --tab-inactive: #0f172a;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8; /* 明るい青 */
            --border-color: #334155;
            --hover-bg: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif; 
            overflow: hidden; 
            background: var(--bg-color); 
            color: var(--text-color); 
        }

        /* 読み込みプログレスバー */
        #loading-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            z-index: 100;
            display: none;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.3s ease;
        }

        /* タブバー */
        #tab-bar {
            display: flex;
            align-items: flex-end;
            padding: 6px 10px 0;
            background: var(--bg-color);
            gap: 2px;
            height: 42px;
            user-select: none;
        }

        #tabs-list {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }

        .tab {
            background: var(--tab-inactive);
            padding: 8px 16px;
            border-radius: 10px 10px 0 0;
            font-size: 12px;
            min-width: 120px;
            max-width: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            color: rgba(241, 245, 249, 0.7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: tabOpen 0.3s ease-out;
        }

        @keyframes tabOpen {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab:hover {
            background: var(--hover-bg);
            color: var(--text-color);
        }

        .tab.active { 
            background: var(--tab-active); 
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-bottom: 1px solid var(--tab-active);
            z-index: 2;
        }
        
        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 12px;
        }

        .close-tab { 
            font-family: Arial, sans-serif;
            font-size: 14px; 
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-tab:hover { background: #f87171; color: white; }

        .add-tab { 
            background: none; 
            border: none; 
            color: white; 
            font-size: 20px; 
            cursor: pointer; 
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 6px;
            margin-left: 4px;
            transition: background 0.2s, transform 0.2s;
        }
        .add-tab:hover { background: var(--hover-bg); transform: rotate(90deg); }

        /* ツールバー */
        #toolbar {
            height: 44px;
            background: var(--toolbar-color);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            z-index: 3;
            position: relative;
        }

        .nav-icons { display: flex; gap: 2px; }
        .nav-btn {
            background: none; 
            border: none; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 50%;
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:hover { background: var(--hover-bg); }
        .nav-btn:active { transform: scale(0.9); }

        #address-bar-container {
            flex-grow: 1;
            background: #0f172a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 32px;
            border: 1px solid var(--border-color);
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        #address-bar-container:focus-within { 
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        #iurl {
            width: 100%;
            background: none;
            border: none;
            color: white;
            outline: none;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        /* お気に入りボタン */
        #fav-btn {
            color: #94a3b8;
            cursor: pointer;
            margin-left: 8px;
            transition: color 0.2s;
            font-size: 18px;
        }
        #fav-btn.active { color: #fbbf24; }

        /* コンテンツ表示エリア */
        #view-container {
            height: calc(100% - 86px);
            background: #ffffff;
            position: relative;
        }

        .browser-view {
            width: 100%; 
            height: 100%; 
            border: none;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .browser-view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ホーム画面 (home.htmlを埋め込むiframe) */
        #home-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex;
            z-index: 10;
            border: none;
        }

        /* お気に入りバー */
        #bookmarks-bar {
            height: 30px;
            background: var(--toolbar-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .bookmark-item {
            font-size: 11px;
            color: var(--text-color);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--hover-bg);
            white-space: nowrap;
            transition: background 0.2s;
        }
        .bookmark-item:hover { background: rgba(255,255,255,0.2); }

        /* 設定画面スタイル */
        #setting-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: none;
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .setting-card {
            background: var(--toolbar-color);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            width: 300px;
            text-align: center;
        }
        .setting-card h2 { margin-top: 0; font-size: 20px; }
        .setting-option {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--hover-bg);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .setting-option:hover { background: rgba(255,255,255,0.15); }
        .setting-option.active { border: 1px solid var(--accent-color); background: rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body>

<div id="loading-bar-container">
    <div id="loading-bar"></div>
</div>

<div id="tab-bar">
    <div id="tabs-list"></div>
    <button class="add-tab" onclick="createNewTab()" title="New Tab">+</button>
</div>

<div id="toolbar">
    <div class="nav-icons">
        <button class="nav-btn" title="Back" onclick="getCurrentFrame()?.contentWindow.history.back()">←</button>
        <button class="nav-btn" title="Forward" onclick="getCurrentFrame()?.contentWindow.history.forward()">→</button>
        <button class="nav-btn" title="Reload" onclick="getCurrentFrame()?.contentWindow.location.reload()">⟳</button>
    </div>
    <div id="address-bar-container">
        <input type="text" id="iurl" placeholder="Search with Google or enter URL" autocomplete="off">
        <span id="fav-btn" onclick="toggleBookmark()" title="Bookmark this page">★</span>
    </div>
    <button class="nav-btn" onclick="goHome()" title="Home">⌂</button>
</div>

<div id="bookmarks-bar"></div>

<div id="view-container">
    <iframe id="home-screen" src="home.html"></iframe>
    <div id="setting-screen">
        <div class="setting-card">
            <h2>Proxy Settings</h2>
            <div id="opt-alloy" class="setting-option" onclick="setProxyMode('alloy')">
                <span>AlloyProxy</span>
                <span id="check-alloy"></span>
            </div>
            <div id="opt-uv" class="setting-option" onclick="setProxyMode('uv')">
                <span>UV Proxy (Bare)</span>
                <span id="check-uv"></span>
            </div>
            <button class="nav-btn" style="width:100%; margin-top:10px; border-radius:8px; background:var(--accent-color); color:#000;" onclick="closeSetting()">Done</button>
        </div>
    </div>
</div>

<script>
    let tabs = [];
    let activeTabId = null;
    let bookmarks = JSON.parse(localStorage.getItem('sennin-bookmarks') || '[]');
    let proxyMode = localStorage.getItem('proxy-mode') || 'alloy'; // 初期設定

    const $ = e => document.getElementById(e);

    // UV Proxy用のスクリプト読み込み
    function loadUV() {
        if (document.getElementById('uv-bundle')) return;
        const scripts = [
            { id: 'uv-bundle', src: '/uv/uv.bundle.js' },
            { id: 'uv-config', src: '/uv/uv.config.js' },
            { id: 'uv-main', src: '/assets/js/main.js' }
        ];
        scripts.forEach(s => {
            const sc = document.createElement('script');
            sc.id = s.id;
            sc.src = s.src;
            document.head.appendChild(sc);
        });
    }

    if (proxyMode === 'uv') loadUV();

    function createNewTab() {
        const id = 'tab-' + Date.now();
        const tabObj = { id, url: '' };
        tabs.push(tabObj);

        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = 'btn-' + id;
        tabEl.innerHTML = `
            <span class="tab-title">New Tab</span>
            <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>
        `;
        tabEl.onclick = () => switchTab(id);
        $('tabs-list').appendChild(tabEl);

        const iframe = document.createElement('iframe');
        iframe.className = 'browser-view';
        iframe.id = 'view-' + id;
        
        // 読み込み開始・終了のイベント監視
        iframe.onload = () => finishLoading();
        
        $('view-container').appendChild(iframe);

        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.browser-view').forEach(v => v.classList.remove('active'));

        const btn = $('btn-' + id);
        if (btn) btn.classList.add('active');
        
        const view = $('view-' + id);
        if (view) view.classList.add('active');

        const currentTab = tabs.find(t => t.id === id);
        $('home-screen').style.display = currentTab.url ? 'none' : 'block';
        $('setting-screen').style.display = 'none';
        $('iurl').value = currentTab.url || '';
        updateFavIcon();
    }

    function closeTab(e, id) {
        e.stopPropagation();
        tabs = tabs.filter(t => t.id !== id);
        const btn = $('btn-' + id);
        const view = $('view-' + id);
        if (btn) btn.remove();
        if (view) view.remove();

        if (activeTabId === id && tabs.length > 0) {
            switchTab(tabs[tabs.length - 1].id);
        } else if (tabs.length === 0) {
            createNewTab();
        }
    }

    function launch(targetUrl = null) {
        if (!activeTabId) createNewTab();
        
        let url = targetUrl || $('iurl').value.trim();
        if (!url) return;

        // 設定画面のトリガー
        if (url === '/setting') {
            openSetting();
            return;
        }

        if (!url.includes('.') && !url.includes('://')) {
            url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        } else if (!url.startsWith('http')) {
            url = 'https://' + url;
        }

        startLoading();
        $('home-screen').style.display = 'none';
        $('setting-screen').style.display = 'none';
        
        let proxyUrl = "";
        if (proxyMode === 'alloy') {
            const origin = btoa(url);
            proxyUrl = window.location.origin + "/prefix/" + origin;
        } else {
            // UV Proxy (Bare) のURL構成例
            proxyUrl = window.location.origin + "/bare/" + encodeURIComponent(url);
        }
        
        const frame = $('view-' + activeTabId);
        frame.src = proxyUrl;
        
        const tab = tabs.find(t => t.id === activeTabId);
        tab.url = url;
        
        try {
            const domain = new URL(url).hostname;
            $('btn-' + activeTabId).querySelector('.tab-title').innerText = domain;
        } catch(e) {
            $('btn-' + activeTabId).querySelector('.tab-title').innerText = url;
        }
        updateFavIcon();
    }

    /* アニメーション制御 */
    function startLoading() {
        $('loading-bar-container').style.display = 'block';
        $('loading-bar').style.width = '0%';
        setTimeout(() => { $('loading-bar').style.width = '70%'; }, 10);
    }

    function finishLoading() {
        $('loading-bar').style.width = '100%';
        setTimeout(() => {
            $('loading-bar-container').style.display = 'none';
            $('loading-bar').style.width = '0%';
        }, 300);
    }

    function getCurrentFrame() {
        return activeTabId ? $('view-' + activeTabId) : null;
    }

    function goHome() {
        if (activeTabId) {
            const tab = tabs.find(t => t.id === activeTabId);
            tab.url = '';
            $('view-' + activeTabId).src = '';
            $('btn-' + activeTabId).querySelector('.tab-title').innerText = 'New Tab';
        }
        $('home-screen').style.display = 'block';
        $('setting-screen').style.display = 'none';
        $('iurl').value = '';
        updateFavIcon();
    }

    /* 設定画面の関数 */
    function openSetting() {
        $('home-screen').style.display = 'none';
        $('setting-screen').style.display = 'flex';
        updateSettingUI();
    }

    function closeSetting() {
        $('setting-screen').style.display = 'none';
        if (!tabs.find(t => t.id === activeTabId).url) {
            $('home-screen').style.display = 'block';
        }
    }

    function setProxyMode(mode) {
        proxyMode = mode;
        localStorage.setItem('proxy-mode', mode);
        if (mode === 'uv') loadUV();
        updateSettingUI();
    }

    function updateSettingUI() {
        document.querySelectorAll('.setting-option').forEach(opt => opt.classList.remove('active'));
        $('check-alloy').innerText = '';
        $('check-uv').innerText = '';

        if (proxyMode === 'alloy') {
            $('opt-alloy').classList.add('active');
            $('check-alloy').innerText = '✔';
        } else {
            $('opt-uv').classList.add('active');
            $('check-uv').innerText = '✔';
        }
    }

    /* お気に入り機能 */
    function toggleBookmark() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if (!currentTab || !currentTab.url) return;

        const index = bookmarks.indexOf(currentTab.url);
        if (index > -1) {
            bookmarks.splice(index, 1);
        } else {
            bookmarks.push(currentTab.url);
        }
        localStorage.setItem('sennin-bookmarks', JSON.stringify(bookmarks));
        renderBookmarks();
        updateFavIcon();
    }

    function renderBookmarks() {
        const bar = $('bookmarks-bar');
        bar.innerHTML = '';
        bookmarks.forEach(url => {
            const item = document.createElement('div');
            item.className = 'bookmark-item';
            try {
                item.innerText = new URL(url).hostname;
            } catch {
                item.innerText = url;
            }
            item.onclick = () => {
                $('iurl').value = url;
                launch(url);
            };
            bar.appendChild(item);
        });
    }

    function updateFavIcon() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if (currentTab && currentTab.url && bookmarks.includes(currentTab.url)) {
            $('fav-btn').classList.add('active');
        } else {
            $('fav-btn').classList.remove('active');
        }
    }

    $('iurl').onkeypress = (e) => { if (e.key === 'Enter') launch(); };

    window.onload = () => {
        createNewTab();
        renderBookmarks();
    };
</script>
</body>
</html>
